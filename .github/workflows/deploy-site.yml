name: deploy site

# Public citizen site -- the ONLY workflow that publishes to GitHub Pages.
#   - On pull_request: front-end tests + a verification build. NO deploy.
#   - On push to main: front-end tests + build + publish to GitHub Pages.
#   - On workflow_dispatch (manual): same as push to main, lets the
#     operator republish without a new commit.
#
# Scope is intentionally front-end only:
#   - The deployed bundle is pure static (Svelte build + datasets/ staged
#     under _site/data/). No Python or admin code ever ships.
#   - Backend pytest (ingest pipeline) and admin console / API tests live
#     in backend.yml and MUST NOT gate the publish. Publish-relevant
#     things are: "does the bundle build?" and "does the built app
#     actually render in a browser?" -- nothing else.
#
# Why one workflow instead of separate gate + deploy:
#   - One build per run. The build IS the verification; on green main
#     the same artifact is the deploy artifact. No throwaway rebuild.
#   - Natural batching via `concurrency.cancel-in-progress: true`. A
#     burst of N commits to main only finishes the latest run (older
#     queued runs are cancelled), so Pages does not republish for every
#     small commit in a stream without needing a cron.
#   - Branch protection (if ever enabled) should require: frontend-vitest,
#     frontend-build, citizen-site-e2e. NOT deploy-pages (it does not
#     run on PRs, so requiring it would block every PR).
#
# See docs/architecture/deployment.md.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Default permissions for every job: read-only.
# The deploy-pages job upgrades its own permissions locally.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-vitest:
    name: vitest (frontend unit + contract + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: vitest
        working-directory: frontend
        run: bun run test

  frontend-build:
    name: build citizen site (Pages artifact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        working-directory: frontend
        # BASE_URL must match the Pages publish path. For project sites
        # this is `/<repo>/`; for user/org sites or custom domains, drop
        # the variable (default `/`). See docs/architecture/deployment.md.
        env:
          BASE_URL: /yen-gov/
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: stage Pages artifact (ADR-0013)
        # The bundle that ships: frontend/dist/ + datasets/ mounted at
        # /data/. The sanity check enforces the dev-time middleware
        # contract (frontend/data-loading.md) at deploy time. Target is
        # the canonical store (election_results.parquet) — the legacy
        # per-state JSON shards retired in PR-O.4 (TODO row 1.8b-ii).
        run: |
          mkdir -p _site
          cp -r frontend/dist/. _site/
          cp -r datasets _site/data
          test -f _site/data/elections/election_results.parquet

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        # Uploaded on every run (including PRs). The deploy-pages job
        # only consumes it on push to main / workflow_dispatch on main.
        # PR uploads expire from artifact storage automatically.
        with:
          path: _site

  citizen-site-e2e:
    name: Playwright e2e (public citizen site)
    runs-on: ubuntu-latest
    # Independent of frontend-build: Playwright runs against `bun run dev`
    # (vite middleware), not against the built bundle. Ordering with
    # frontend-vitest is optional but keeps the failure-mode tidy
    # (cheaper jobs report first).
    needs: [frontend-vitest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        working-directory: frontend
        run: bun install --frozen-lockfile

      # Chromium + Pixel-5 mobile project (see frontend/playwright.config.ts).
      - name: install playwright browser
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: golden-path e2e
        working-directory: frontend
        run: bun run test:e2e

      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: citizen-site-playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  deploy-pages:
    name: deploy to GitHub Pages
    # Runs only when ALL gating jobs are green AND the trigger is a
    # main-branch push or a manual dispatch on main. PRs never deploy.
    needs: [frontend-vitest, frontend-build, citizen-site-e2e]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - name: smoke check (deployed election_results.parquet)
        # Round-trips the deployed bundle: fetch the canonical Parquet
        # from the live URL and assert it is a real Parquet payload
        # (PAR1 magic header at offset 0 + at offset -4). Defends the
        # Pages MIME / Range-request contract that DuckDB-WASM depends
        # on for the frontend reader (see deployment.md). The legacy
        # per-state result.summary.json smoke target retired in PR-O.4
        # (TODO row 1.8b-ii).
        run: |
          base="${{ steps.deployment.outputs.page_url }}"
          url="${base}data/elections/election_results.parquet"
          for i in 1 2 3; do
            if curl -fsSL "$url" -o /tmp/election_results.parquet; then break; fi
            sleep 10
          done
          test -s /tmp/election_results.parquet
          python3 -c "p=open('/tmp/election_results.parquet','rb').read(); assert p[:4]==b'PAR1' and p[-4:]==b'PAR1', 'not a parquet file (missing PAR1 magic)'"

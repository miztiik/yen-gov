name: deploy site

# Builds the frontend and stages datasets/ next to it (per ADR-0013), then
# publishes to GitHub Pages. Triggered hourly or manually, only for CI-green main.

on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
      head_sha: ${{ steps.decide.outputs.head_sha }}
    steps:
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "$REF_NAME" != "main" ]; then
            echo "deploy-site.yml only publishes from main; got ref '$REF_NAME'"
            exit 1
          fi

          head_sha="$(gh api "repos/${GITHUB_REPOSITORY}/branches/main" --jq '.commit.sha')"
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"
          echo "latest main SHA: ${head_sha}"

          ci_success_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci-checks.yml/runs?branch=main&head_sha=${head_sha}&status=completed&per_page=20" --jq '.workflow_runs[] | select(.conclusion == "success") | .id' | head -n 1)"
          if [ -z "$ci_success_id" ]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "No successful ci-checks.yml run found for ${head_sha}; skipping deploy."
            exit 0
          fi
          echo "CI gate passed via run ${ci_success_id}."

          if [ "$EVENT_NAME" = "schedule" ]; then
            deployed_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-site.yml/runs?branch=main&head_sha=${head_sha}&status=completed&per_page=20" --jq '.workflow_runs[] | select(.conclusion == "success") | .id' | head -n 1)"
            if [ -n "$deployed_id" ]; then
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
              echo "SHA ${head_sha} was already deployed by run ${deployed_id}; skipping scheduled redeploy."
              exit 0
            fi
          fi

          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

  build:
    needs: preflight
    if: needs.preflight.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.head_sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: build frontend
        working-directory: frontend
        # BASE_URL must match the Pages publish path. For project sites this
        # is `/<repo>/`; for user/org sites or custom domains, drop the
        # variable (default `/`). See docs/architecture/deployment.md.
        env:
          BASE_URL: /yen-gov/
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: stage Pages artifact (ADR-0013)
        run: |
          mkdir -p _site
          cp -r frontend/dist/. _site/
          cp -r datasets _site/data
          # Sanity: the dev-time middleware contract must hold at deploy.
          test -f _site/data/elections/AcGenMay2026/S22/result.summary.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: fetch deployed result.summary.json
        run: |
          base="${{ needs.deploy.outputs.page_url }}"
          url="${base}data/elections/AcGenMay2026/S22/result.summary.json"
          for i in 1 2 3; do
            if curl -fsSL "$url" -o /tmp/summary.json; then break; fi
            sleep 10
          done
          test -s /tmp/summary.json
          python3 -c "import json; d=json.load(open('/tmp/summary.json')); assert d['state']=='S22', d"

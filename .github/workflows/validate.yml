name: validate

# Schema sanity (Tier A) + data conformance (Tier B) + backend pytest +
# frontend type-check / build. Live network tests skipped via YEN_GOV_NO_NET=1.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      YEN_GOV_NO_NET: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        working-directory: backend
        run: pytest -q

      - name: schema + data validation
        working-directory: backend
        run: python -m yen_gov validate --root ..

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: build
        working-directory: frontend
        run: bun run build

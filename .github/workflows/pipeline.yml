name: Regenerate Election Datasets From Sources

# Manual scrape of upstream sources (ECI + Wikipedia) into datasets/.
# Opens a PR rather than committing to main directly so the diff is reviewed.

on:
  workflow_dispatch:
    inputs:
      event:
        description: ECI event id (e.g. AcGenMay2026)
        required: true
        default: AcGenMay2026
      state:
        description: ECI state code (e.g. S22)
        required: true
        default: S22
      reference:
        description: Also re-scrape Wikipedia state reference (districts + ACs)
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: scrape Wikipedia reference (optional)
        if: ${{ inputs.reference }}
        run: python -m yen_gov reference ${{ inputs.state }} --root .

      - name: scrape ECI results
        run: python -m yen_gov run ${{ inputs.event }} ${{ inputs.state }} --root .

      - name: validate emitted datasets
        run: python -m yen_gov validate --root .

      - name: open PR with regenerated data
        uses: peter-evans/create-pull-request@v7
        with:
          branch: pipeline/${{ inputs.event }}-${{ inputs.state }}
          title: "data: regenerate ${{ inputs.event }} / ${{ inputs.state }}"
          body: |
            Automated scrape via `pipeline.yml`.

            - event: `${{ inputs.event }}`
            - state: `${{ inputs.state }}`
            - reference re-scraped: `${{ inputs.reference }}`

            Validator passed before this PR was opened. Review the dataset diff
            for unexpected swings before merging.
          commit-message: "data: regenerate ${{ inputs.event }} / ${{ inputs.state }}"
          add-paths: |
            datasets/**

name: ci checks

# Schema sanity (Tier A, via fixture-based pytest) + backend pytest +
# frontend type-check / build + Playwright smoke. Live network tests
# skipped via YEN_GOV_NO_NET=1. Gate only -- nothing publishes from
# this workflow.
#
# Tier-B corpus conformance is a LOCAL pre-emit check
# (`python -m yen_gov validate --root .`), NOT gated here. See
# docs/architecture/backend/validator.md for the rationale.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      YEN_GOV_NO_NET: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pytest
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: build
        working-directory: frontend
        run: bun run build

      - name: vitest (unit + contract + integration)
        working-directory: frontend
        run: bun run test

  admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        working-directory: admin
        run: bun install --frozen-lockfile

      - name: type-check
        working-directory: admin
        run: bun run check

      - name: vitest (api contract)
        working-directory: admin
        run: bun run test

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        working-directory: frontend
        run: bun install --frozen-lockfile

      # Chromium + Pixel-5 mobile project (see frontend/playwright.config.ts).
      - name: install playwright browser
        working-directory: frontend
        run: bunx playwright install --with-deps chromium

      - name: golden-path e2e
        working-directory: frontend
        run: bun run test:e2e

      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  admin-e2e:
    runs-on: ubuntu-latest
    needs: [backend, admin]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        working-directory: admin
        run: bun install --frozen-lockfile

      # Admin e2e mocks /api/* via page.route — no FastAPI backend needed.
      - name: install playwright browser
        working-directory: admin
        run: bunx playwright install --with-deps chromium

      - name: admin panels e2e
        working-directory: admin
        run: bun run test:e2e

      - name: upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: admin-playwright-report
          path: admin/playwright-report/
          retention-days: 7
